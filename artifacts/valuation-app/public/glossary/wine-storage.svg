<svg xmlns="http://www.w3.org/2000/svg" width="260" height="72" viewBox="0 0 260 72" role="img" aria-label="Cool stable storage good hot shelf bad">
  <text x="10" y="16" font-family="system-ui,sans-serif" font-size="11" fill="#1a7f37">Better: cool, dark, stable</text>
  <rect x="10" y="22" width="36" height="46" rx="4" fill="#2d6a4f" opacity="0.85"/>
  <rect x="18" y="30" width="20" height="32" rx="2" fill="#8d5524"/>
  <text x="55" y="48" font-family="system-ui,sans-serif" font-size="10" fill="#444">Cellar, bonded, or wine fridge.</text>
  <text x="10" y="70" font-family="system-ui,sans-serif" font-size="11" fill="#c0392b">Risky: hot sun, kitchen heat</text>
  <rect x="170" y="28" width="80" height="8" rx="2" fill="#f4d03f"/>
  <rect x="188" y="16" width="28" height="22" rx="2" fill="#c0392b" opacity="0.7"/>
</svg>
