<svg xmlns="http://www.w3.org/2000/svg" width="260" height="76" viewBox="0 0 260 76" role="img" aria-label="Mint never hinged vs hinged stamp gum">
  <text x="8" y="14" font-family="system-ui,sans-serif" font-size="11" fill="#666">MNH (no hinge mark)</text>
  <rect x="8" y="20" width="48" height="50" rx="2" fill="#f4f4f4" stroke="#999"/>
  <rect x="14" y="38" width="36" height="28" fill="#d4a574" stroke="#8b6f47"/>
  <text x="65" y="44" font-family="system-ui,sans-serif" font-size="10" fill="#444">Smooth gum, no paper tab scar.</text>
  <text x="8" y="72" font-family="system-ui,sans-serif" font-size="11" fill="#666">Hinged (thin mark from mount)</text>
  <rect x="140" y="56" width="48" height="18" rx="2" fill="#eaeaea" stroke="#999"/>
  <rect x="146" y="60" width="36" height="10" fill="#c5e6c0"/>
</svg>
