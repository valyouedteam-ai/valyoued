  <rect x="8" y="22" width="72" height="52" rx="6" fill="#e8ecf0" stroke="#9aa7b2"/>
  <rect x="16" y="30" width="56" height="36" rx="2" fill="#cfe8ff" stroke="#6b90c0"/>
