            required: [price, platform, condition]
            properties:
              price:
                type: number
              soldAt:
                type: string
              platform:
                type: string
              condition:
                type: string
              daysToSell:
                type: integer
              detail:
                type: string
        demandMovement:
          type: string
          enum: [rising, stable, softening]
        avgDaysToSell:
          type: integer
        bestPlatform:
          type: string
        suggestedListingPrice:
          type: number
        buyBelowPrice:
          type: number
        expectedMarginPct:
          type: number
        analyticsNote:
          type: string
    CreateMarketWatchBody:
      type: object
      required: [assetClass, label]
      properties:
        assetClass:
          type: string
        label:
          type: string
        brand:
          type: string
        model:
          type: string
        yearFrom:
          type: integer
        yearTo:
          type: integer
    InventoryItem:
