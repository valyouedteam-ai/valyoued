      properties:
        title:
          type: string
        stage:
          type: string
          enum: [sourced, purchased, in_prep, photographed, listed, offer_received, sold, unsold, returned]
        estimateId:
          type: string
        costBasis:
          type: number
        listPrice:
          type: number
        currency:
          type: string
    PatchInventoryItemBody:
      type: object
