openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: "ValYoued: multi-asset valuation API"
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: fx
    description: FX hints for USD normalization
  - name: estimate
    description: Asset estimate operations
  - name: portfolio
    description: Portfolio workspaces
  - name: vision
    description: Vision extract
  - name: listing
    description: Listing drafts
  - name: alerts
    description: Portfolio alerts and notifications
  - name: trader
    description: Professional trader workspace
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /fx/rates:
    get:
      operationId: getFxRates
      tags: [fx]
      summary: USD normalization multipliers
      description: |
        Multipliers to convert row currencies to approximate USD (aligned with the portfolio dashboard and
        `GET /estimates/stats`). When `FX_LIVE_ENABLED` is set on the API server, rates are refreshed from
        Frankfurter (ECB) and cached; currencies missing from the feed keep static fallback values.
      responses:
        "200":
          description: FX snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxRatesResponse"
  /asset-types:
    get:
      operationId: listAssetTypes
      tags: [estimate]
      summary: List supported asset types and their input fields
      responses:
        "200":
          description: Asset types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetType"
  /regions:
    get:
      operationId: listRegions
      tags: [estimate]
      summary: List supported seller regions and their currencies
      responses:
        "200":
          description: Regions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Region"
  /estimates:
    get:
      operationId: listEstimates
      tags: [estimate]
      summary: List recent estimates
      responses:
        "200":
          description: Recent estimates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EstimateSummary"
    post:
      operationId: createEstimate
      tags: [estimate]
      summary: Create a new asset estimate (tier derived from subscription / free limits)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateInput"
      responses:
        "200":
          description: Estimate result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResult"
        "429":
          description: Free tier monthly valuation limit reached
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /estimates/{id}:
    get:
      operationId: getEstimate
      tags: [estimate]
      summary: Get an estimate by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResult"
    patch:
      operationId: patchEstimate
      tags: [estimate]
      summary: Update estimate metadata (intent, optional outcome labels, feedback)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchEstimateBody"
      responses:
        "200":
          description: Updated estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResult"
  /estimates/{id}/refine:
    post:
      operationId: refineEstimate
      tags: [estimate]
      summary: Re-run valuation with enriched input (Everyday or Professional)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefineEstimateBody"
      responses:
        "200":
          description: Refined estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateResult"
        "403":
          description: Paid tier required
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /portfolios:
    get:
      operationId: listPortfolios
      tags: [portfolio]
      summary: List portfolio workspaces (primary is auto-created)
      responses:
        "200":
          description: Portfolios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Portfolio"
    post:
      operationId: createPortfolio
      tags: [portfolio]
      summary: Create extra workspace (Professional trading desk)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortfolioBody"
      responses:
        "200":
          description: Portfolio created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
        "403":
          description: Add-on or plan not allowed for this workspace type
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /portfolios/{id}:
    delete:
      operationId: deletePortfolio
      tags: [portfolio]
      summary: Delete a non-primary portfolio workspace
      description: |
        Removes a trading desk or inheritance workspace. Valuations on that workspace move to the primary portfolio.
        Does not cancel inheritance billing.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Portfolio deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePortfolioResponse"
        "403":
          description: Primary portfolio cannot be deleted
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
        "404":
          description: Portfolio not found
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /estimates/stats:
    get:
      operationId: getEstimateStats
      tags: [estimate]
      summary: Aggregate stats across saved estimates
      description: |
        Portfolio-wide aggregates for the authenticated user. `averageBaselineUsd`, `averageAdjustedUsd`,
        and `byAssetType[].averageAdjustedUsd` are totals after converting each estimate through the same multiplier
        table as `GET /fx/rates` (Frankfurter/ECB when `FX_LIVE_ENABLED`, else static hints) into one internal rollup
        unit for mixing currencies. Clients typically translate that rollup into the signed-in user's UI reference
        currency (configured in Settings; often labeled alongside portfolio totals).

        `averageUplift` is the unweighted mean of per-row (adjustedMid / baselineMid − 1) ratios
        (pure numbers; not FX-converted).
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateStats"
  /notifications:
    get:
      operationId: listNotifications
      tags: [alerts]
      summary: List in-app portfolio alerts
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserNotification"
    patch:
      operationId: patchNotifications
      tags: [alerts]
      summary: Mark notifications read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchNotificationsBody"
      responses:
        "200":
          description: Updated count
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer
  /market-watches:
    get:
      operationId: listMarketWatches
      tags: [trader]
      summary: List Market Watch targets (Professional)
      responses:
        "200":
          description: Watches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketWatch"
    post:
      operationId: createMarketWatch
      tags: [trader]
      summary: Create a Market Watch target (Professional)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarketWatchBody"
      responses:
        "200":
          description: Watch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketWatch"
        "403":
          description: Professional plan required
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /market-watches/{id}:
    delete:
      operationId: deleteMarketWatch
      tags: [trader]
      summary: Remove a Market Watch target
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /market-watches/{id}/refresh:
    post:
      operationId: refreshMarketWatch
      tags: [trader]
      summary: Re-run web research for a Market Watch target (Professional)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Refreshed watch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketWatch"
        "403":
          description: Professional plan required
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
        "404":
          description: Watch not found
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
        "429":
          description: Refresh rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
  /inventory:
    get:
      operationId: listInventoryItems
      tags: [trader]
      summary: List inventory pipeline items (Professional)
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [trader]
      summary: Add item to inventory pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemBody"
      responses:
        "200":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
  /inventory/{id}:
    patch:
      operationId: patchInventoryItem
      tags: [trader]
      summary: Update inventory stage or pricing fields
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchInventoryItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [trader]
      summary: Remove an inventory pipeline item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /reports/business:
    get:
      operationId: getBusinessReport
      tags: [trader]
      summary: Exportable business report snapshot (Professional)
      parameters:
        - in: query
          name: month
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
      responses:
        "200":
          description: Business report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessReport"
  /vision/extract:
    post:
      operationId: extractFromPhoto
      tags: [vision]
      summary: Extract asset attributes from an uploaded photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisionExtractInput"
      responses:
        "200":
          description: Extracted attributes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionExtractResult"
  /listings:
    get:
      operationId: listListingDrafts
      tags: [listing]
      summary: List all saved listing ad drafts
      responses:
        "200":
          description: Drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingDraft"
    post:
      operationId: generateListingDraft
      tags: [listing]
      summary: Generate a marketplace listing ad for an existing estimate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateListingInput"
      responses:
        "200":
          description: Generated and saved draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDraft"
  /listings/{id}:
    get:
      operationId: getListingDraft
      tags: [listing]
      summary: Get a single saved listing draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDraft"
    delete:
      operationId: deleteListingDraft
      tags: [listing]
      summary: Delete a saved listing draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    FxRatesResponse:
      type: object
      required: [source, rates, fetchedAt]
      properties:
        source:
          type: string
          enum: [frankfurter, static]
          description: frankfurter when live ECB feed was merged with static fallbacks; static when live FX is off or the fetch failed
        asOf:
          type: string
          nullable: true
          description: ECB rate date from Frankfurter when source is frankfurter
        fetchedAt:
          type: string
          description: ISO-8601 timestamp when this snapshot was built on the API
        rates:
          type: object
          additionalProperties:
            type: number
          description: Multiply an amount in currency C by rates[C] (after uppercasing) to approximate USD
    Region:
      type: object
      required: [name, currencyCode, currencySymbol]
      properties:
        name:
          type: string
        currencyCode:
          type: string
        currencySymbol:
          type: string
    AssetField:
      type: object
      required: [key, label, type, required]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, number, select, textarea]
        required:
          type: boolean
        placeholder:
          type: string
        help:
          type: string
        options:
          type: array
          items:
            type: string
    AssetType:
      type: object
      required: [id, name, category, tagline, fields, exampleAttributes, internationallyTradeable]
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          description: Group label (such as "Watches & Jewelry", "Vehicles", "Real Estate")
        tagline:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/AssetField"
        exampleAttributes:
          type: string
        internationallyTradeable:
          type: boolean
          description: Whether this asset is practical to ship/sell across borders
    EstimateInput:
      type: object
      required: [assetTypeId, title, condition, currentRegion, currency]
      properties:
        assetTypeId:
          type: string
        title:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        condition:
          type: number
        purchasePrice:
          type: number
          description: Original purchase price in the seller's local currency
        currentRegion:
          type: string
        currency:
          type: string
          description: ISO 4217 currency code derived from currentRegion
        attributes:
          type: string
        extraFields:
          type: object
          additionalProperties:
            type: string
          description: Free-form key/value attributes captured from the dynamic form
        portfolioId:
          type: string
          format: uuid
          description: Workspace to attach this valuation to; defaults to primary portfolio
    ValuationLineage:
      type: object
      description: Server-computed reproducibility metadata (prompt versioning, hashes, retrieval ids).
      properties:
        promptVersion:
          type: string
        promptSha256:
          type: string
        llmProvider:
          type: string
        llmModel:
          type: string
        retrievalSnapshotId:
          type: string
          nullable: true
          description: Stable id over the retrieved internal-comp slice used for prompt context when enabled.
        internalArchiveMatchCount:
          type: integer
        newsArticleCount:
          type: integer
        structuredFallback:
          type: boolean
          description: True when heuristic fallback ran instead of a successful structured LLM parse.
        experimentKey:
          type: string
          nullable: true
          description: Optional A/B or shadow cohort key when VALUATION_EXPERIMENT_KEY is set on the API.
        webSearchQueries:
          type: array
          items:
            type: string
          description: Planned web search queries used for market comp research (Tavily).
        webSearchHitCount:
          type: integer
          description: Number of web search snippets retrieved for this valuation.
        citationUrls:
          type: array
          items:
            type: string
            format: uri
          description: Source URLs from web research used when building comparables.
    ValuationOutcome:
      type: object
      description: User-reported realized sale as returned by the API (timestamps assigned server-side).
      required: [soldPrice, recordedAt]
      properties:
        soldPrice:
          type: number
        currency:
          type: string
          description: ISO 4217 when different from valuation currency; omit to match valuation row currency.
        recordedAt:
          type: string
          format: date-time
    ValuationFeedback:
      type: object
      description: Helpfulness signal returned by the API (timestamps assigned server-side).
      required: [helpful, recordedAt]
      properties:
        helpful:
          type: boolean
        recordedAt:
          type: string
          format: date-time
    PatchValuationOutcome:
      type: object
      additionalProperties: false
      description: Supplies sold price on PATCH; omit currency to inherit the estimate row currency.
      required: [soldPrice]
      properties:
        soldPrice:
          type: number
        currency:
          type: string
    PatchValuationFeedback:
      type: object
      additionalProperties: false
      required: [helpful]
      properties:
        helpful:
          type: boolean
    PatchEstimateBody:
      type: object
      description: >-
        Provide at least one of intent, valuationOutcome, or valuationFeedback (or any combination).
      additionalProperties: false
      properties:
        intent:
          type: string
          enum: [hold, monitor, sell]
        valuationOutcome:
          $ref: "#/components/schemas/PatchValuationOutcome"
        valuationFeedback:
          $ref: "#/components/schemas/PatchValuationFeedback"
    Portfolio:
      type: object
      required: [id, userId, purpose, label, themeKey, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
        purpose:
          type: string
          description: primary, pro_board desk, or inheritance add-on workspace
        label:
          type: string
        themeKey:
          type: string
        createdAt:
          type: string
          format: date-time
    CreatePortfolioBody:
      type: object
      additionalProperties: false
      required: [purpose]
      properties:
        purpose:
          type: string
          enum: [pro_board, inheritance]
        label:
          type: string
    DeletePortfolioResponse:
      type: object
      required: [ok, reassignedEstimateCount]
      properties:
        ok:
          type: boolean
          enum: [true]
        reassignedEstimateCount:
          type: integer
          minimum: 0
    Comparable:
      type: object
      required: [source, description, price, year]
      properties:
        source:
          type: string
        description:
          type: string
        price:
          type: number
          description: Price in the result currency
        year:
          type: integer
        url:
          type: string
        conditionCue:
          type: string
          description: Condition / completeness shorthand for this comp (not the seller copy)
        locationOrChannel:
          type: string
          description: Geography or outlet shorthand (EU consignment, US auction floor, Japan Yahoo, etc.)
        transactionTypeGuess:
          type: string
          enum: [sold_estimate, asking_price, unknown]
        relevanceExplanation:
          type: string
          description: One concise line tying this comp to the wizard inputs or tier hint
        matchTier:
          type: string
          enum: [strong, moderate, broadAnalogue]
        imageUrl:
          type: string
          description: Optional HTTPS thumbnail when the cited evidence page has a stable image URL
    MarketSignal:
      type: object
      required: [label, value, impact, rationale]
      properties:
        label:
          type: string
        value:
          type: string
        impact:
          type: number
        rationale:
          type: string
    WorldEvent:
      type: object
      required: [title, summary, sentiment, scope]
      properties:
        title:
          type: string
        summary:
          type: string
        sentiment:
          type: string
          enum: [positive, negative, neutral]
        scope:
          type: string
          description: 'Typical values: "Global", "United Kingdom", "EU"'
        source:
          type: string
        url:
          type: string
        publishedAt:
          type: string
          description: Article publication date (RFC 2822 or ISO 8601)
    ArbitrageOption:
      type: object
      required: [region, marketplace, estimatedSalePrice, estimatedShipping, estimatedFees, estimatedDuties, netToSeller, currency, demandNote, recommended]
      properties:
        region:
          type: string
        marketplace:
          type: string
        estimatedSalePrice:
          type: number
        estimatedShipping:
          type: number
        estimatedFees:
          type: number
        estimatedDuties:
          type: number
        netToSeller:
          type: number
        currency:
          type: string
          description: Currency for the values in this row (matches result currency)
        demandNote:
          type: string
        recommended:
          type: boolean
    NegotiationTactic:
      type: object
      required: [title, detail]
      properties:
        title:
          type: string
        detail:
          type: string
    ProInsights:
      type: object
      required: [negotiationTactics, talkingPoints, redFlags, optimalTiming, listingTips, walkAwayPrice, anchorPrice]
      properties:
        negotiationTactics:
          type: array
          items:
            $ref: "#/components/schemas/NegotiationTactic"
        talkingPoints:
          type: array
          items:
            type: string
        redFlags:
          type: array
          items:
            type: string
        optimalTiming:
          type: string
        listingTips:
          type: array
          items:
            type: string
        walkAwayPrice:
          type: number
        anchorPrice:
          type: number
    EstimateReport:
      type: object
      required: [headline, summary, baselineNarrative, marketNarrative, arbitrageNarrative, worldEventsNarrative, finalNarrative]
      properties:
        headline:
          type: string
        summary:
          type: string
        baselineNarrative:
          type: string
        marketNarrative:
          type: string
        arbitrageNarrative:
          type: string
        worldEventsNarrative:
          type: string
        finalNarrative:
          type: string
    EstimateResult:
      type: object
      required:
        - id
        - createdAt
        - input
        - assetType
        - currency
        - baselineLow
        - baselineHigh
        - baselineMid
        - comparables
        - marketSignals
        - worldEvents
        - netMarketFactor
        - adjustedLow
        - adjustedHigh
        - adjustedMid
        - arbitrage
        - bestArbitrageRegion
        - report
        - tier
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        input:
          $ref: "#/components/schemas/EstimateInput"
        assetType:
          $ref: "#/components/schemas/AssetType"
        currency:
          type: string
        baselineLow:
          type: number
        baselineHigh:
          type: number
        baselineMid:
          type: number
        comparables:
          type: array
          items:
            $ref: "#/components/schemas/Comparable"
        marketSignals:
          type: array
          items:
            $ref: "#/components/schemas/MarketSignal"
        worldEvents:
          type: array
          items:
            $ref: "#/components/schemas/WorldEvent"
        netMarketFactor:
          type: number
        adjustedLow:
          type: number
        adjustedHigh:
          type: number
        adjustedMid:
          type: number
        arbitrage:
          type: array
          items:
            $ref: "#/components/schemas/ArbitrageOption"
        bestArbitrageRegion:
          type: string
        report:
          $ref: "#/components/schemas/EstimateReport"
        tier:
          type: string
          enum: [free, pro]
        proInsights:
          $ref: "#/components/schemas/ProInsights"
        intent:
          type: string
          nullable: true
          enum: [hold, monitor, sell]
        valuationLineage:
          $ref: "#/components/schemas/ValuationLineage"
        valuationOutcome:
          $ref: "#/components/schemas/ValuationOutcome"
        valuationFeedback:
          $ref: "#/components/schemas/ValuationFeedback"
        portfolioAnalytics:
          $ref: "#/components/schemas/PortfolioAnalytics"
        traderAnalytics:
          $ref: "#/components/schemas/TraderAnalytics"
    EstimateSummary:
      type: object
      required:
        [
          id,
          title,
          assetTypeId,
          assetTypeName,
          baselineMid,
          adjustedMid,
          currency,
          bestArbitrageRegion,
          tier,
          portfolioShelf,
          createdAt,
        ]
      properties:
        id:
          type: string
        title:
          type: string
        assetTypeId:
          type: string
        assetTypeName:
          type: string
        baselineMid:
          type: number
        adjustedMid:
          type: number
        currency:
          type: string
        bestArbitrageRegion:
          type: string
        tier:
          type: string
          enum: [free, pro]
          description: Tier used when the valuation was generated (Pro unlocks full arbitrage rows on the report).
        currentRegion:
          type: string
          description: Seller region from stored valuation input when available.
        portfolioShelf:
          type: string
          enum: [luxury, everyday, other]
          description: >-
            Shelf for portfolio grouping: from the seller tier captured on the estimate plus asset-class hints.
        createdAt:
          type: string
          format: date-time
        portfolioId:
          type: string
          format: uuid
          nullable: true
        intent:
          type: string
          nullable: true
          enum: [hold, monitor, sell]
        adjustedLow:
          type: number
        adjustedHigh:
          type: number
        confidenceScore:
          type: integer
          minimum: 0
          maximum: 100
        resalePotential:
          type: string
          enum: [low, moderate, strong]
        actionRecommendation:
          type: string
          enum: [sell, hold, insure]
        valuationFreshness:
          type: string
          enum: [fresh, aging, stale]
        receiptStatus:
          type: string
          enum: [documented, partial, missing]
        insuranceGap:
          type: boolean
    EstimateStats:
      type: object
      required: [count, averageBaselineUsd, averageAdjustedUsd, averageUplift, byAssetType, topArbitrageRegions]
      properties:
        count:
          type: integer
        averageBaselineUsd:
          type: number
          description: Mean baseline midpoint after converting each row through the same multiplier table as GET /fx/rates into an internal rollup unit for cross-currency averaging (ECB/Frankfurter when FX_LIVE_ENABLED, else static fallbacks; approximate). The SPA shows this in the user's Settings reference currency.
        averageAdjustedUsd:
          type: number
          description: Mean adjusted midpoint normalized the same way as averageBaselineUsd. Display in UI reference currency (Settings).
        averageUplift:
          type: number
          description: Mean of (adjustedMid / baselineMid − 1) per estimate, using each row's native amounts.
        byAssetType:
          type: array
          items:
            type: object
            required: [assetTypeName, count, averageAdjustedUsd]
            properties:
              assetTypeName:
                type: string
              count:
                type: integer
              averageAdjustedUsd:
                type: number
                description: Mean adjusted midpoint for this asset type through the GET /fx/rates multiplier rollup; surface in Settings reference currency in the SPA.
        topArbitrageRegions:
          type: array
          items:
            type: object
            required: [region, count]
            properties:
              region:
                type: string
              count:
                type: integer
        portfolioHealth:
          $ref: "#/components/schemas/PortfolioHealth"
    PortfolioAnalytics:
      type: object
      required:
        [confidenceScore, fieldCompleteness, resalePotential, actionRecommendation, valuationFreshness, receiptStatus]
      properties:
        confidenceScore:
          type: integer
          minimum: 0
          maximum: 100
        fieldCompleteness:
          $ref: "#/components/schemas/FieldCompleteness"
        resalePotential:
          type: string
          enum: [low, moderate, strong]
        actionRecommendation:
          type: string
          enum: [sell, hold, insure]
        valuationFreshness:
          type: string
          enum: [fresh, aging, stale]
        receiptStatus:
          type: string
          enum: [documented, partial, missing]
        insuranceGap:
          type: boolean
        confidenceBreakdown:
          type: object
          properties:
            fieldCompleteness:
              type: integer
            compQuality:
              type: integer
            marketStability:
              type: integer
    FieldCompleteness:
      type: object
      required: [completed, missing, pct]
      properties:
        completed:
          type: array
          items:
            type: string
        missing:
          type: array
          items:
            type: string
        pct:
          type: integer
          minimum: 0
          maximum: 100
    PortfolioHealth:
      type: object
      required:
        [totalPortfolioUsd, valueGrowthPct, resaleStrengthIndex, diversificationScore, underinsuredCount, missingReceiptsCount, needsRevaluationCount]
      properties:
        totalPortfolioUsd:
          type: number
        valueGrowthPct:
          type: number
        resaleStrengthIndex:
          type: number
        diversificationScore:
          type: integer
          minimum: 0
          maximum: 100
        underinsuredCount:
          type: integer
        missingReceiptsCount:
          type: integer
        needsRevaluationCount:
          type: integer
    TraderAnalytics:
      type: object
      required: [dealScore, maxBuyPrice, expectedResale]
      properties:
        dealScore:
          type: string
          enum: [strong_buy, good_margin, fair, risky, overpriced, avoid]
        maxBuyPrice:
          type: number
        expectedResale:
          type: number
        expectedMargin:
          type: number
          description: Percent margin when cost basis is known
        costBasis:
          type: number
    RefineEstimateBody:
      type: object
      properties:
        brand:
          type: string
        model:
          type: string
        year:
          type: number
        purchasePrice:
          type: number
        condition:
          type: number
        attributes:
          type: string
        extraFields:
          type: object
          additionalProperties: true
    UserNotification:
      type: object
      required: [id, kind, title, body, createdAt, read]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [value_up, value_down, revalue, receipt, milestone, reprice]
        title:
          type: string
        body:
          type: string
        estimateId:
          type: string
          nullable: true
        href:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
    PatchNotificationsBody:
      type: object
      properties:
        markAllRead:
          type: boolean
        ids:
          type: array
          items:
            type: string
            format: uuid
    MarketWatch:
      type: object
      required: [id, label, assetClass, createdAt, snapshot, snapshotStatus]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        assetClass:
          type: string
        brand:
          type: string
        model:
          type: string
        yearFrom:
          type: integer
        yearTo:
          type: integer
        createdAt:
          type: string
          format: date-time
        snapshotStatus:
          type: string
          enum: [pending, ready, failed]
        snapshotUpdatedAt:
          type: string
          format: date-time
        citations:
          type: array
          items:
            type: string
            format: uri
        snapshot:
          $ref: "#/components/schemas/MarketWatchSnapshot"
    MarketWatchSnapshot:
      type: object
      required: [trendPoints, recentSales, demandMovement, avgDaysToSell, bestPlatform, suggestedListingPrice, buyBelowPrice, expectedMarginPct]
      properties:
        trendPoints:
