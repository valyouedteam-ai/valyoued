          type: array
          items:
            type: object
            additionalProperties: true
    VisionExtractInput:
      type: object
      required: [assetTypeId, imageBase64, mimeType]
      properties:
        assetTypeId:
          type: string
        imageBase64:
          type: string
          description: Base64-encoded image content (without the data URI prefix)
        mimeType:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/gif]
    VisionExtractResult:
      type: object
      required: [extracted, confidence, notes]
      properties:
        extracted:
          type: object
          additionalProperties:
            type: string
          description: >-
            Detected attributes keyed by AssetField key (only fields where inference confidence is sufficient)
        confidence:
          type: number
          description: Overall confidence 0..1
        notes:
          type: string
          description: Free-form description of notable details inferred from the image
        suggestedTitle:
          type: string
        detectedAssetTypeId:
          type: string
          description: If the photo suggests a different asset type than the one selected, the suggested asset type id
    GenerateListingInput:
      type: object
      required: [estimateId, platform]
      properties:
        estimateId:
          type: string
        platform:
          type: string
          enum: [facebook-marketplace, ebay, gumtree, craigslist, depop, vinted, vestiaire-collective, autotrader, chrono24, rightmove]
        priceStrategy:
          type: string
          enum: [quick-sale, market, premium]
          description: How aggressively to price relative to the market-adjusted estimate
    PhotoTip:
      type: object
      required: [angle, description]
      properties:
        angle:
          type: string
          description: 'Typical values: "Front 3/4", "Top-down", "Serial number close-up"'
        description:
          type: string
          description: What to capture and why it boosts buyer trust
    ListingDraft:
      type: object
